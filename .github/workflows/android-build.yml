name: RTH Official Android Build System

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the project code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Setup Java for Android
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Handle dependencies automatically
      # This checks for lock file, if missing it creates one automatically.
      - name: Install Project Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 5. Prebuild the native Android framework
      - name: Generate Native Android Workspace
        run: npx expo prebuild --platform android --no-install

      # 6. Make Gradle executable
      - name: Grant Executable Permissions
        run: chmod +x android/gradlew

      # 7. Compile the release APK
      - name: Build Production APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 8. Upload the final APK file to GitHub
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Transit-Horizon-Release
          path: android/app/build/outputs/apk/release/app-release.apk
