name: Clean, Prettify and Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # گٹھب سرور کو واپس کوڈ پش کرنے کی اجازت دینے کے لیے یہ لازمی ہے
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Clean Project and Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Format Code
        run: |
          npx prettier --write "src/**/*.{js,jsx,json,md}" || true

      - name: Commit and Push Updated package-lock and Formatted Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json src/
          git diff-index --quiet HEAD || git commit -m "chore: automated clean, format and lockfile update [skip ci]"
          git push origin main
